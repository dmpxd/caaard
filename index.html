<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>かな稽古 — hiragana drills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --yozora:#121826;      /* night-sky background */
    --ai:#1c2740;          /* indigo panel */
    --ai-edge:#2a3958;     /* lighter indigo for borders/hover */
    --card-top:#2b3652;    /* card surface, top of gradient */
    --card-bottom:#1e2740; /* card surface, bottom of gradient */
    --ink:#f2ecdd;         /* off-white ink color for kana + text */
    --beni:#c8503f;        /* hanko vermillion (slightly brighter for dark bg) */
    --beni-dim:#8c2d22;
    --mist:#8f9bb3;        /* muted text on dark */
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    height:100%;
    background:
      radial-gradient(ellipse at 50% -10%, #202b47 0%, var(--yozora) 55%);
    color:var(--mist);
    font-family:'Zen Kaku Gothic New', sans-serif;
    overflow-x:hidden;
  }

  .stage{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 20px 40px;
  }

  /* ---------- top bar ---------- */
  .topbar{
    width:100%;
    max-width:640px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:clamp(24px, 6vh, 56px);
  }
  .brand{
    font-family:'Klee One', cursive;
    font-size:22px;
    color:#eee6d3;
    letter-spacing:0.02em;
  }
  .brand span{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--mist);
    margin-top:2px;
  }
  .mode-switch{
    display:flex;
    gap:2px;
    background:var(--ai);
    border-radius:8px;
    padding:3px;
  }
  .mode-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--mist);
    background:none;
    border:none;
    border-radius:6px;
    padding:7px 12px;
    cursor:pointer;
    transition:background 0.15s ease, color 0.15s ease;
  }
  .mode-btn:hover{ color:#eee6d3; }
  .mode-btn.active{
    background:var(--ai-edge);
    color:#eee6d3;
  }

  .stats{
    display:flex;
    gap:22px;
    margin-top:auto;
    padding-top:36px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.05em;
  }
  .stats span{ color:var(--mist); text-transform:uppercase; font-size:10px; }
  .stats b{
    display:block;
    color:#eee6d3;
    font-size:18px;
    text-align:center;
    font-weight:600;
  }
  .stats .streak-on b{ color:var(--beni); }

  /* ---------- card ---------- */
  .board{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width:420px;
  }

  .card-wrap{
    position:relative;
    width:280px;
    height:280px;
    perspective:1000px;
  }

  .card{
    position:relative;
    width:100%;
    height:100%;
    background:linear-gradient(160deg, var(--card-top), var(--card-bottom));
    border-radius:6px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      0 18px 40px -12px rgba(0,0,0,0.6),
      0 2px 0 rgba(0,0,0,0.3);
    transform:rotate(-0.6deg);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.25s ease, opacity 0.18s ease;
  }
  .card.enter{ animation:cardIn 0.36s ease both; }
  @keyframes cardIn{
    from{ opacity:0; transform:rotate(-0.6deg) translateY(10px) scale(0.97); }
    to{ opacity:1; transform:rotate(-0.6deg) translateY(0) scale(1); }
  }
  .card.shake{ animation:shake 0.36s ease; }
  @keyframes shake{
    10%,90%{ transform:rotate(-0.6deg) translateX(-3px); }
    20%,80%{ transform:rotate(-0.6deg) translateX(4px); }
    30%,50%,70%{ transform:rotate(-0.6deg) translateX(-6px); }
    40%,60%{ transform:rotate(-0.6deg) translateX(6px); }
    100%{ transform:rotate(-0.6deg) translateX(0); }
  }

  .kana{
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size:150px;
    line-height:1;
    color:var(--ink);
    user-select:none;
    transform:translateY(-4px);
  }

  .mark{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:visible;
  }
  .mark path{
    fill:none;
    stroke:var(--beni);
    stroke-width:7;
    stroke-linecap:round;
    stroke-dasharray:600;
    stroke-dashoffset:600;
    opacity:0;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,0.15));
  }
  .mark.show-correct #maruPath{
    animation:draw 0.1s linear forwards;
  }
  .mark.show-wrong #batsu1{
    animation:draw 0.22s ease forwards;
  }
  .mark.show-wrong #batsu2{
    animation:draw 0.22s ease 0.16s forwards;
  }
  @keyframes draw{
    from{ stroke-dashoffset:600; opacity:1; }
    to{ stroke-dashoffset:0; opacity:1; }
  }

  /* ---------- answer area ---------- */
  .answer-row{
    margin-top:34px;
    width:220px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  #input{
    width:100%;
    text-align:center;
    background:transparent;
    border:none;
    outline:none;
    font-family:'JetBrains Mono', monospace;
    font-size:32px;
    letter-spacing:0.18em;
    color:#f4ecd9;
    padding-bottom:10px;
    border-bottom:2px solid var(--ai-edge);
    transition:border-color 0.2s ease;
    caret-color:var(--ink);
  }
  #input:focus{ border-color:#f4ecd9; }
  #input.wrong-flash{ border-color:var(--beni); }

  .hint{
    margin-top:14px;
    height:16px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--mist);
    text-align:center;
  }
  .hint.err{ color:var(--beni); }
  .hint.ok{ color:#7fae8c; }

  /* ---------- progress bar ---------- */
  .progress{
    padding-top:16px;
    width:100%;
    display:flex;
    justify-content:center;
  }
  .progress-bar{
    width:100%;
    max-width:280px;
    height:6px;
    background:var(--ai-edge);
    border-radius:999px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:var(--beni);
    border-radius:999px;
    transition:width 0.3s ease;
  }

  .reset-link{
    margin-top:18px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ai-edge);
    background:none;
    border:none;
    cursor:pointer;
  }
  .reset-link:hover{ color:var(--mist); }

  @media (max-width:480px){
    .card-wrap{ width:220px; height:220px; }
    .kana{ font-size:118px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="topbar">
    <div class="brand">alphacards</div>
    <div class="mode-switch" id="modeSwitch">
      <button class="mode-btn active" data-mode="hiragana" type="button">hiragana</button>
      <button class="mode-btn" data-mode="katakana" type="button">katakana</button>
    </div>
  </div>

  <div class="board">
    <div class="card-wrap">
      <div class="card enter" id="card">
        <svg class="mark" id="mark" viewBox="0 0 200 200">
          <path id="maruPath" d="M100,20 C150,20 178,60 178,100 C178,150 145,180 100,180 C55,180 22,148 22,100 C22,55 58,20 100,20" />
          <path id="batsu1" d="M45,45 L155,155" />
          <path id="batsu2" d="M155,45 L45,155" />
        </svg>
        <div class="kana" id="kana">あ</div>
      </div>
    </div>

    <div class="answer-row">
      <input id="input" type="text" maxlength="3" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus />
      <div class="hint" id="hint">type the sound</div>
    </div>
  </div>

  <div class="stats">
    <div id="streakWrap">
      <span>streak</span>
      <b id="streakVal">0</b>
    </div>
    <div>
      <span>mastered</span>
      <b id="masteredVal">0 / 46</b>
    </div>
  </div>

  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <button class="reset-link" id="resetBtn">reset progress</button>
</div>

<script>
(function(){
  const HIRAGANA = [
    {k:'あ',r:'a'},{k:'い',r:'i'},{k:'う',r:'u'},{k:'え',r:'e'},{k:'お',r:'o'},
    {k:'か',r:'ka'},{k:'き',r:'ki'},{k:'く',r:'ku'},{k:'け',r:'ke'},{k:'こ',r:'ko'},
    {k:'が',r:'ga'},{k:'ぎ',r:'gi'},{k:'ぐ',r:'gu'},{k:'げ',r:'ge'},{k:'ご',r:'go'},
    {k:'さ',r:'sa'},{k:'し',r:'shi'},{k:'す',r:'su'},{k:'せ',r:'se'},{k:'そ',r:'so'},
    {k:'ざ',r:'za'},{k:'じ',r:'ji'},{k:'ず',r:'zu'},{k:'ぜ',r:'ze'},{k:'ぞ',r:'zo'},
    {k:'た',r:'ta'},{k:'ち',r:'chi'},{k:'つ',r:'tsu'},{k:'て',r:'te'},{k:'と',r:'to'},
    {k:'だ',r:'da'},{k:'ぢ',r:'ji'},{k:'づ',r:'zu'},{k:'で',r:'de'},{k:'ど',r:'do'},
    {k:'な',r:'na'},{k:'に',r:'ni'},{k:'ぬ',r:'nu'},{k:'ね',r:'ne'},{k:'の',r:'no'},
    {k:'は',r:'ha'},{k:'ひ',r:'hi'},{k:'ふ',r:'fu'},{k:'へ',r:'he'},{k:'ほ',r:'ho'},
    {k:'ば',r:'ba'},{k:'び',r:'bi'},{k:'ぶ',r:'bu'},{k:'べ',r:'be'},{k:'ぼ',r:'bo'},
    {k:'ぱ',r:'pa'},{k:'ぴ',r:'pi'},{k:'ぷ',r:'pu'},{k:'ぺ',r:'pe'},{k:'ぽ',r:'po'},
    {k:'ま',r:'ma'},{k:'み',r:'mi'},{k:'む',r:'mu'},{k:'め',r:'me'},{k:'も',r:'mo'},
    {k:'や',r:'ya'},{k:'ゆ',r:'yu'},{k:'よ',r:'yo'},
    {k:'ら',r:'ra'},{k:'り',r:'ri'},{k:'る',r:'ru'},{k:'れ',r:'re'},{k:'ろ',r:'ro'},
    {k:'わ',r:'wa'},{k:'を',r:'wo'},
    {k:'ん',r:'n'}
  ];

  const KATAKANA = [
    {k:'ア',r:'a'},{k:'イ',r:'i'},{k:'ウ',r:'u'},{k:'エ',r:'e'},{k:'オ',r:'o'},
    {k:'カ',r:'ka'},{k:'キ',r:'ki'},{k:'ク',r:'ku'},{k:'ケ',r:'ke'},{k:'コ',r:'ko'},
    {k:'ガ',r:'ga'},{k:'ギ',r:'gi'},{k:'グ',r:'gu'},{k:'ゲ',r:'ge'},{k:'ゴ',r:'go'},
    {k:'サ',r:'sa'},{k:'シ',r:'shi'},{k:'ス',r:'su'},{k:'セ',r:'se'},{k:'ソ',r:'so'},
    {k:'ザ',r:'za'},{k:'ジ',r:'ji'},{k:'ズ',r:'zu'},{k:'ゼ',r:'ze'},{k:'ゾ',r:'zo'},
    {k:'タ',r:'ta'},{k:'チ',r:'chi'},{k:'ツ',r:'tsu'},{k:'テ',r:'te'},{k:'ト',r:'to'},
    {k:'ダ',r:'da'},{k:'ヂ',r:'ji'},{k:'ヅ',r:'zu'},{k:'デ',r:'de'},{k:'ド',r:'do'},
    {k:'ナ',r:'na'},{k:'ニ',r:'ni'},{k:'ヌ',r:'nu'},{k:'ネ',r:'ne'},{k:'ノ',r:'no'},
    {k:'ハ',r:'ha'},{k:'ヒ',r:'hi'},{k:'フ',r:'fu'},{k:'ヘ',r:'he'},{k:'ホ',r:'ho'},
    {k:'バ',r:'ba'},{k:'ビ',r:'bi'},{k:'ブ',r:'bu'},{k:'ベ',r:'be'},{k:'ボ',r:'bo'},
    {k:'パ',r:'pa'},{k:'ピ',r:'pi'},{k:'プ',r:'pu'},{k:'ペ',r:'pe'},{k:'ポ',r:'po'},
    {k:'マ',r:'ma'},{k:'ミ',r:'mi'},{k:'ム',r:'mu'},{k:'メ',r:'me'},{k:'モ',r:'mo'},
    {k:'ヤ',r:'ya'},{k:'ユ',r:'yu'},{k:'ヨ',r:'yo'},
    {k:'ラ',r:'ra'},{k:'リ',r:'ri'},{k:'ル',r:'ru'},{k:'レ',r:'re'},{k:'ロ',r:'ro'},
    {k:'ワ',r:'wa'},{k:'ヲ',r:'wo'},
    {k:'ン',r:'n'}
  ];

  const DATASETS = { hiragana: HIRAGANA, katakana: KATAKANA };
  let mode = 'hiragana';

  const el = {
    card: document.getElementById('card'),
    mark: document.getElementById('mark'),
    kana: document.getElementById('kana'),
    input: document.getElementById('input'),
    hint: document.getElementById('hint'),
    progress: document.getElementById('progress'),
    progressFill: document.getElementById('progressFill'),
    streakVal: document.getElementById('streakVal'),
    streakWrap: document.getElementById('streakWrap'),
    masteredVal: document.getElementById('masteredVal'),
    resetBtn: document.getElementById('resetBtn'),
    modeSwitch: document.getElementById('modeSwitch'),
  };

  let mastered = new Set();
  let streak = 0;
  let current = null;
  let lastKana = null;
  let locked = false; // true while a correct-answer transition is happening
  let pool = []; // active characters not yet mastered this round

  function activeSet(){
    return DATASETS[mode];
  }

  function resetState(){
    mastered = new Set();
    streak = 0;
    lastKana = null;
    pool = activeSet().slice();
  }

  function updateProgressBar(){
    const total = activeSet().length;
    const pct = total ? (mastered.size / total) * 100 : 0;
    el.progressFill.style.width = pct + '%';
  }

  function updateStats(){
    el.streakVal.textContent = streak;
    el.streakWrap.classList.toggle('streak-on', streak >= 3);
    el.masteredVal.textContent = mastered.size + ' / ' + activeSet().length;
    updateProgressBar();
  }

  function pickNext(){
    if(pool.length === 0) return null;
    let choice;
    do{
      choice = pool[Math.floor(Math.random() * pool.length)];
    }while(choice.k === lastKana && pool.length > 1);
    lastKana = choice.k;
    return choice;
  }

  function showCompletion(){
    current = null;
    el.kana.textContent = '\u2713';
    el.mark.classList.remove('show-correct', 'show-wrong');
    el.input.value = '';
    el.input.blur();
    el.hint.textContent = 'all ' + activeSet().length + ' mastered — reset to practice again';
    el.hint.className = 'hint ok';
  }

  function showCard(h, animate){
    if(!h){
      showCompletion();
      return;
    }
    current = h;
    el.kana.textContent = h.k;
    el.mark.classList.remove('show-correct', 'show-wrong');
    // reset stroke animation state
    ['maruPath','batsu1','batsu2'].forEach(id=>{
      const p = document.getElementById(id);
      p.style.animation = 'none';
      p.offsetHeight; // reflow
      p.style.animation = '';
    });
    el.input.value = '';
    el.input.classList.remove('wrong-flash');
    el.hint.textContent = 'type the sound';
    el.hint.className = 'hint';
    if(animate){
      el.card.classList.remove('enter');
      el.card.offsetHeight;
      el.card.classList.add('enter');
    }
    el.input.focus();
  }

  function nextCard(){
    showCard(pickNext(), true);
  }

  function markCorrect(){
    locked = true;
    el.mark.classList.add('show-correct');
    el.hint.textContent = 'correct';
    el.hint.className = 'hint ok';
    mastered.add(current.k);
    pool = pool.filter(h => h.k !== current.k);
    streak += 1;
    updateStats();
    setTimeout(() => {
      locked = false;
      nextCard();
    }, 130);
  }

  function markWrong(){
    streak = 0;
    updateStats();
    el.mark.classList.add('show-wrong');
    el.card.classList.remove('shake');
    el.card.offsetHeight;
    el.card.classList.add('shake');
    el.input.classList.add('wrong-flash');
    el.hint.textContent = 'not quite — try again';
    el.hint.className = 'hint err';
    setTimeout(() => {
      el.input.value = '';
      el.mark.classList.remove('show-wrong');
      ['batsu1','batsu2'].forEach(id=>{
        const p = document.getElementById(id);
        p.style.animation = 'none';
        p.offsetHeight;
        p.style.animation = '';
      });
      el.input.focus();
    }, 420);
  }

  function checkAnswer(){
    if(locked || !current) return;
    const val = el.input.value.trim().toLowerCase();
    if(!val) return;
    if(val === current.r){
      markCorrect();
    }else{
      markWrong();
    }
  }

  el.input.addEventListener('input', () => {
    if(locked || !current) return;
    if(el.input.value.length >= current.r.length){
      checkAnswer();
    }
  });

  el.input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      checkAnswer();
    }
  });

  el.resetBtn.addEventListener('click', () => {
    resetState();
    updateStats();
    nextCard();
  });

  el.modeSwitch.addEventListener('click', (e) => {
    const btn = e.target.closest('.mode-btn');
    if(!btn || btn.classList.contains('active')) return;
    [...el.modeSwitch.children].forEach(b => b.classList.toggle('active', b === btn));
    mode = btn.dataset.mode;
    resetState();
    updateStats();
    showCard(pickNext(), true);
  });

  resetState();
  updateStats();
  showCard(pickNext(), false);
})();
</script>

</body>
</html>
